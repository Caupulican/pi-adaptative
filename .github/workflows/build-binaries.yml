name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.12.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Build binaries
        run: ./scripts/build-binaries.sh

      - name: Upload release binaries for platform verification
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-binaries
          path: packages/coding-agent/binaries/pi-*
          if-no-files-found: error
          retention-days: 7

  verify-windows-binary:
    name: Verify Windows binary (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
          - runner: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    needs: build
    permissions:
      contents: read
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-binaries
          path: artifacts

      - name: Smoke test native Windows binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $arch = "${{ matrix.arch }}"
          $archive = Join-Path $PWD "artifacts\pi-windows-$arch.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "pi-adaptative\windows-$arch"
          $agentDir = Join-Path $env:RUNNER_TEMP "pi-adaptative\agent"
          New-Item -ItemType Directory -Force -Path $extractDir, $agentDir | Out-Null
          Expand-Archive -LiteralPath $archive -DestinationPath $extractDir -Force
          $exe = Join-Path $extractDir "pi.exe"
          $env:PI_ADAPTATIVE_CODING_AGENT_DIR = $agentDir

          $required = @(
            "pi.exe",
            "native\win32\prebuilds\win32-$arch\win32-console-mode.node",
            "node_modules\@mariozechner\clipboard-win32-$arch-msvc"
          )
          foreach ($relativePath in $required) {
            if (-not (Test-Path (Join-Path $extractDir $relativePath))) {
              throw "Windows $arch archive is missing $relativePath"
            }
          }

          & $exe --version
          if ($LASTEXITCODE -ne 0) { throw "pi.exe --version failed with exit code $LASTEXITCODE" }
          & $exe --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "pi.exe --help failed with exit code $LASTEXITCODE" }
          & $exe --list-models | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "pi.exe --list-models failed with exit code $LASTEXITCODE" }

          $startInfo = [System.Diagnostics.ProcessStartInfo]::new()
          $startInfo.FileName = $exe
          $startInfo.UseShellExecute = $false
          $startInfo.RedirectStandardInput = $true
          $startInfo.RedirectStandardOutput = $true
          $startInfo.RedirectStandardError = $true
          foreach ($argument in @("--mode", "rpc", "--no-session", "--no-extensions")) {
            [void]$startInfo.ArgumentList.Add($argument)
          }
          $rpc = [System.Diagnostics.Process]::new()
          $rpc.StartInfo = $startInfo
          if (-not $rpc.Start()) { throw "Failed to start pi.exe RPC smoke" }

          function Read-RpcResponse([string]$id) {
            $deadline = [DateTime]::UtcNow.AddSeconds(30)
            while ([DateTime]::UtcNow -lt $deadline) {
              $remaining = [Math]::Max(1, [int]($deadline - [DateTime]::UtcNow).TotalMilliseconds)
              $lineTask = $rpc.StandardOutput.ReadLineAsync()
              if (-not $lineTask.Wait($remaining)) { throw "Timed out waiting for RPC response $id" }
              $line = $lineTask.Result
              if ($null -eq $line) {
                throw "pi.exe RPC closed before response ${id}: $($rpc.StandardError.ReadToEnd())"
              }
              $record = $line | ConvertFrom-Json
              if ($record.id -eq $id) { return $record }
            }
            throw "Timed out waiting for RPC response $id"
          }

          $rpc.StandardInput.WriteLine('{"id":"state","type":"get_state"}')
          $rpc.StandardInput.Flush()
          $state = Read-RpcResponse "state"
          if (-not $state.success) { throw "RPC get_state did not return a successful response" }

          $rpc.StandardInput.WriteLine('{"id":"shell","type":"bash","command":"echo windows-rpc-ok"}')
          $rpc.StandardInput.Flush()
          $shell = Read-RpcResponse "shell"
          if (-not $shell.success -or $shell.data.exitCode -ne 0 -or $shell.data.output -notmatch "windows-rpc-ok") {
            throw "RPC bash contract did not execute successfully through PowerShell: $($shell | ConvertTo-Json -Compress -Depth 8)"
          }

          $rpc.StandardInput.Close()
          if (-not $rpc.WaitForExit(30000)) {
            $rpc.Kill($true)
            throw "pi.exe RPC did not exit after stdin closed"
          }
          if ($rpc.ExitCode -ne 0) { throw "pi.exe RPC smoke failed with exit code $($rpc.ExitCode)" }

  release:
    runs-on: ubuntu-latest
    needs: [build, verify-windows-binary]
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Download verified release binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-binaries
          path: packages/coding-agent/binaries

      - name: Extract changelog for this version
        run: |
          VERSION="${RELEASE_TAG#v}"
          WORK_DIR="${RUNNER_TEMP}/pi-adaptative/release"
          NOTES_FILE="${WORK_DIR}/release-notes.md"
          mkdir -p "${WORK_DIR}"
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" packages/coding-agent/CHANGELOG.md > "${NOTES_FILE}"
          if [ ! -s "${NOTES_FILE}" ]; then
            echo "Release ${VERSION}" > "${NOTES_FILE}"
          fi

      - name: Create GitHub Release and upload verified binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BINARIES_DIR="packages/coding-agent/binaries"
          NOTES_FILE="${RUNNER_TEMP}/pi-adaptative/release/release-notes.md"
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file "${NOTES_FILE}" \
            "${BINARIES_DIR}/pi-darwin-arm64.tar.gz" \
            "${BINARIES_DIR}/pi-darwin-x64.tar.gz" \
            "${BINARIES_DIR}/pi-linux-x64.tar.gz" \
            "${BINARIES_DIR}/pi-linux-arm64.tar.gz" \
            "${BINARIES_DIR}/pi-windows-x64.zip" \
            "${BINARIES_DIR}/pi-windows-arm64.zip" \
            2>/dev/null || \
          gh release upload "${RELEASE_TAG}" \
            "${BINARIES_DIR}/pi-darwin-arm64.tar.gz" \
            "${BINARIES_DIR}/pi-darwin-x64.tar.gz" \
            "${BINARIES_DIR}/pi-linux-x64.tar.gz" \
            "${BINARIES_DIR}/pi-linux-arm64.tar.gz" \
            "${BINARIES_DIR}/pi-windows-x64.zip" \
            "${BINARIES_DIR}/pi-windows-arm64.zip" \
            --clobber

  publish-npm:
    runs-on: ubuntu-latest
    # The binary build is a mandatory release gate: packages publish to npm only
    # after the cross-platform binaries build successfully, so a broken build
    # never ships a release. This job also runs its own build/check/test below.
    needs: release
    # Override the top-level contents:write — this job only needs to read the
    # repo and mint an OIDC token for npm provenance attestations.
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        # Deterministic CI: use the COMMITTED model catalogs instead of refetching live pricing
        # that can drift between the release commit and this run (drift fails the artifact
        # verification and aborts the npm publish).
        env:
          PI_SKIP_MODEL_FETCH: "1"
        run: npm run build

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Verify release artifacts are committed
        run: git diff --exit-code

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish.mjs
